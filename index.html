<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,minimal-ui">
    <title>Slither Pro</title>
    <style>
        html,body{margin:0;overflow:hidden;background:#0b0c10;font-family:Arial;user-select:none;touch-action:none;}
        canvas{display:block;position:absolute;top:0;left:0;z-index:2;touch-action:none;}
        #gridBg{position:absolute;width:100vw;height:100vh;background-image:linear-gradient(rgba(69,243,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(69,243,255,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:1;}
        .box{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(11,12,16,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10;}
        .card{background:#1f2833;padding:30px;border-radius:16px;text-align:center;border:2px solid #45f3ff;color:#fff;}
        input,button{padding:12px;font-size:16px;border-radius:8px;border:none;margin:8px;outline:none;}
        input{width:200px;text-align:center;background:#fff;font-weight:bold;}
        button{background:#45f3ff;color:#0b0c10;font-weight:bold;cursor:pointer;}
        #ui{position:absolute;top:15px;left:15px;color:#45f3ff;font-size:18px;font-weight:bold;z-index:5;display:none;}
        #leaderboard{position:absolute;top:15px;right:15px;color:#fff;background:rgba(31,40,51,0.8);padding:10px;border-radius:8px;min-width:130px;font-size:12px;border:1px solid rgba(69,243,255,0.2);z-index:5;display:none;}
        #boostBtn{position:absolute;bottom:35px;right:35px;width:80px;height:80px;background:rgba(255,71,87,0.3);border:3px solid #ff4757;border-radius:50%;color:#fff;font-weight:bold;font-size:15px;display:none;justify-content:center;align-items:center;z-index:8;box-shadow:0 0 15px rgba(2ff,71,87,0.4);}
    </style>
</head>
<body>
<div id="gridBg"></div>
<div id="menu" class="box">
    <div class="card">
        <h1 style="color:#45f3ff;margin:0 0 10px 0;">SLITHER SPEED</h1>
        <input type="text" id="pName" value="Gamer_" maxlength="10">
        <br><button id="joinBtn" onclick="connectToServer()">PHÓNG XUẤT</button>
        <div id="status" style="color:#ffa502;font-size:13px;margin-top:10px;"></div>
    </div>
</div>
<div id="over" class="box" style="display:none;">
    <div class="card" style="border-color:#ff4757;">
        <h2 style="color:#ff4757;margin:0 0 15px 0;">PHI THUYỀN BỊ NỔ!</h2>
        <button onclick="location.reload()" style="background:#ff4757;color:#fff;">TÁI SINH</button>
    </div>
</div>
<div id="ui">Năng lượng: <span id="sc">0</span></div>
<div id="leaderboard"><div id="lbl"></div></div>
<canvas id="cv"></canvas>
<div id="boostBtn">BOOST</div>
<script>
const cv=document.getElementById("cv"),ctx=cv.getContext("2d"),bg=document.getElementById("gridBg");
let ws,serverPlayers={},foods=[],myId,isBoost=false,angle=0,MAP_SIZE=3500,lastSendTime=0,renderPlayers={};
const isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent);
window.onresize=()=>{cv.width=window.innerWidth;cv.height=window.innerHeight;};window.onresize();

const SERVER_URL = "wss://james95it-slither-backend.hf.space/ws";
const HTTP_URL = "https://james95it-slither-backend.hf.space/";

function connectToServer(){
    let name=document.getElementById("pName").value.trim()||"Player";
    document.getElementById("status").innerText="Đang kết nối...";
    document.getElementById("joinBtn").disabled=true;
    fetch(HTTP_URL, { mode: 'no-cors' }).catch(()=>{});

    ws=new WebSocket(SERVER_URL);
    ws.onopen=()=>{
        ws.send(JSON.stringify({type:'join',name:name}));document.getElementById("menu").style.display="none";
        document.getElementById("ui").style.display=document.getElementById("leaderboard").style.display="block";
        if(isMobile)document.getElementById("boostBtn").style.display="flex";loop();
    };
    ws.onmessage=(e)=>{
        const d=JSON.parse(e.data);
        if(d.type==='init'){myId=d.myId;MAP_SIZE=d.mapSize;}
        else if(d.type==='state'){
            serverPlayers=d.players;foods=d.foods;
            if(myId&&serverPlayers[myId])document.getElementById("sc").innerText=Math.floor(serverPlayers[myId].sc*10);updateLb();
        }else if(d.type==='dead'){document.getElementById("ui").style.display=document.getElementById("leaderboard").style.display="none";document.getElementById("boostBtn").style.display="none";document.getElementById("over").style.display="flex";}
    };
    ws.onerror=()=>{document.getElementById("joinBtn").disabled=false;document.getElementById("status").innerText="Thất bại. Thử lại!";};
    
    // ĐÃ FIX: Xử lý bộ điều khiển thông minh riêng biệt PC & Di Động cảm ứng
    if(!isMobile){
        window.onmousemove=(e)=>{angle=Math.atan2(e.clientY-cv.height/2,e.clientX-cv.width/2);};
        window.onmousedown=(e)=>{if(e.button===0)isBoost=true;};
        window.onmouseup=(e)=>{if(e.button===0)isBoost=false;};
    }else{
        // Gắn thẳng sự kiện cảm ứng vào Canvas để không bị lỗi cuộn trang của trình duyệt di động
        const chặnCuộn = (e) => { if(e.cancelable) e.preventDefault(); };
        cv.addEventListener("touchstart",(e)=>{
            chặnCuộn(e); let t=e.touches[0]; if(!t)return;
            angle=Math.atan2(t.clientY-cv.height/2,t.clientX-cv.width/2);
        },{passive:false});
        cv.addEventListener("touchmove",(e)=>{
            chặnCuộn(e); let t=e.touches[0]; if(!t)return;
            angle=Math.atan2(t.clientY-cv.height/2,t.clientX-cv.width/2);
        },{passive:false});
        
        // Cấu hình riêng cho nút bấm BOOST trên di động cực nhạy
        const b=document.getElementById("boostBtn");
        b.addEventListener("touchstart",(e)=>{ e.preventDefault(); e.stopPropagation(); isBoost=true; },{passive:false});
        b.addEventListener("touchend",(e)=>{ e.preventDefault(); e.stopPropagation(); isBoost=false; },{passive:false});
    }
}
function updateLb(){
    let act=Object.keys(serverPlayers).map(id=>serverPlayers[id]).filter(p=>p&&p.isAlive);act.sort((a,b)=>b.sc-a.sc);
    let html="<h4 style='margin:0 0 5px 0;color:#45f3ff;text-align:center;'>TOP RANK</h4>";
    act.slice(0,5).forEach((p,idx)=>{let style=(p.id===myId)?"color:#45f3ff;font-weight:bold;":"";html+=`<div style="${style}">${idx+1}. ${p.name}: ${Math.floor(p.sc*10)}</div>`;});
    document.getElementById("lbl").innerHTML=html;
}
const lerp=(s,e,a)=>(1-a)*s+a*e;
function drawEye(cx,cy,r,a,o,d){
    let ex=cx+Math.cos(a)*o+Math.cos(a+d)*d,ey=cy+Math.sin(a)*o+Math.sin(a+d)*d;
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex,ey,Math.max(2, r*0.2),0,7);ctx.fill();
}
function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    let now=Date.now();
    if(ws&&ws.readyState===WebSocket.OPEN&&(now-lastSendTime>35)){
        ws.send(JSON.stringify({type:'input',a:angle,isBoost:isBoost}));lastSendTime=now;
    }
    Object.keys(serverPlayers).forEach(id=>{
        let s=serverPlayers[id];if(!s||!s.isAlive){delete renderPlayers[id];return;}
        if(!renderPlayers[id])renderPlayers[id]={x:s.x,y:s.y,a:s.a,r:s.r,c:s.c,name:s.name,isBoosting:s.isBoosting,body:JSON.parse(JSON.stringify(s.body))};
        let rP=renderPlayers[id];rP.x=lerp(rP.x,s.x,0.25);rP.y=lerp(rP.y,s.y,0.25);rP.a=lerp(rP.a,s.a,0.25);rP.isBoosting=s.isBoosting;rP.r=s.r;
        if(s.body&&s.body.length>0){
            if(rP.body.length!==s.body.length)rP.body=JSON.parse(JSON.stringify(s.body));
            for(let i=0;i<s.body.length;i++)if(rP.body[i]&&s.body[i]){rP.body[i].x=lerp(rP.body[i].x,s.body[i].x,0.25);rP.body[i].y=lerp(rP.body[i].y,s.body[i].y,0.25);}
        }
    });
    let me=renderPlayers[myId];if(!me){requestAnimationFrame(loop);return;}
    let camX=cv.width/2-me.x,camY=cv.height/2-me.y;bg.style.backgroundPosition=`${camX}px ${camY}px`;
    ctx.strokeStyle="rgba(69,243,255,0.15)";ctx.lineWidth=6;ctx.strokeRect(camX,camY,MAP_SIZE,MAP_SIZE);
    foods.forEach(f=>{ctx.beginPath();ctx.arc(f.x+camX,f.y+camY,f.r,0,7);ctx.fillStyle=f.c;ctx.fill();});
    Object.keys(renderPlayers).forEach(id=>{
        let s=renderPlayers[id],sx=s.x+camX,sy=s.y+camY;
        if(s.body&&s.body.length>0){
            for(let i=s.body.length-1;i>=0;i-=2)if(s.body[i]){
                let cr=s.r*0.9;
                ctx.beginPath();ctx.arc(s.body[i].x+camX,s.body[i].y+camY,cr,0,7);ctx.fillStyle=s.isBoosting?"#ff4757":s.c+"cc";ctx.fill();
            }
        }
        ctx.beginPath();ctx.arc(sx,sy,s.r,0,7);ctx.fillStyle=s.c;ctx.fill();
        drawEye(sx,sy,s.r,s.a,s.r*0.5,-s.r*0.3);drawEye(sx,sy,s.r,s.a,s.r*0.5,s.r*0.3);
        ctx.fillStyle="#fff";ctx.font="bold 12px Arial";ctx.textAlign="center";ctx.fillText(s.name,sx,sy-s.r-8);
    });
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
