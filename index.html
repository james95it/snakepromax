<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Slither Mini</title>
    <style>
        body{margin:0;overflow:hidden;background:#111;font-family:Arial;}
        #menu,#ui,#over{position:absolute;color:#fff;text-align:center;width:100%;z-index:5;}
        #menu,#over{height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;justify-content:center;align-items:center;}
        input,button{padding:10px;font-size:16px;margin:5px;border-radius:5px;border:none;}
        button{background:#2ecc71;color:#fff;font-weight:bold;cursor:pointer;}
        #ui{display:none;text-align:left;padding:15px;pointer-events:none;}
    </style>
</head>
<body>

<div id="menu">
    <h2>SLITHER MINI</h2>
    <input type="text" id="pName" value="Player1" maxlength="10">
    <button onclick="start(document.getElementById('pName').value)">CHƠI</button>
</div>

<div id="over" style="display:none;">
    <h2 style="color:#ff4757;">GAME OVER</h2>
    <button onclick="location.reload()">CHƠI LẠI</button>
</div>

<div id="ui">
    <b>Điểm: <span id="sc">0</span></b>
    <div id="lb" style="margin-top:10px;background:rgba(0,0,0,0.5);padding:10px;border-radius:5px;"></div>
</div>

<canvas id="cv"></canvas>

<script>
const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
let snakes=[], foods=[], isBoost=false, pSnake, active=false;
const colors=["#ff4757","#2ed573","#1e90ff","#ffa502","#9b59b6"];

window.onresize=()=>{cv.width=window.innerWidth; cv.height=window.innerHeight;};
window.onmousemove=(e)=>{ if(pSnake){pSnake.tx=e.clientX; pSnake.ty=e.clientY;} };
window.onmousedown=(e)=>{if(e.button===0) isBoost=true;};
window.onmouseup=(e)=>{if(e.button===0) isBoost=false;};

function start(name){
    window.onresize(); document.getElementById("menu").style.display="none";
    document.getElementById("ui").style.display="block"; active=true;
    pSnake = spawn(cv.width/2, cv.height/2, "#2980b9", name||"Player", false);
    for(let i=0;i<5;i++) spawn(Math.random()*cv.width, Math.random()*cv.height, colors[i], "Bot_"+i, true);
    for(let i=0;i<60;i++) fSpawn();
    loop();
}

function spawn(x,y,c,n,b){
    let s={id:Math.random(),x:x,y:y,r:13,n:n,c:c,isB:b,sp:2,a:0,body:[],len:20,sc:0,tx:x,ty:y,timer:0};
    for(let i=0;i<100;i++) s.body.push({x:x,y:y});
    snakes.push(s); return s;
}

function fSpawn(x,y,r,c){
    foods.push({x:x||Math.random()*cv.width, y:y||Math.random()*cv.height, r:r||3, c:c||colors[Math.floor(Math.random()*5)]});
}

function loop(){
    if(!active) return;
    ctx.clearRect(0,0,cv.width,cv.height);

    // Vẽ thức ăn
    foods.forEach(f=>{ ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,7);ctx.fillStyle=f.c;ctx.fill(); });

    snakes.forEach(s=>{
        // Xử lý AI của Bot
        if(s.isB && (--s.timer<=0 || s.x<10 || s.x>cv.width-10 || s.y<10 || s.y>cv.height-10)){
            s.timer=Math.random()*100+50;
            let f=foods[Math.floor(Math.random()*foods.length)];
            if(f){s.tx=f.x; s.ty=f.y;}
        }

        // Di chuyển & Tăng tốc
        let dx=s.tx-s.x, dy=s.ty-s.y, dist=Math.sqrt(dx*dx+dy*dy);
        let b = s.isB ? (Math.random()<0.05 && s.sc>5) : isBoost;
        if(b && s.sc>0){ s.sp=4.5; s.sc-=0.05; s.len=20+s.sc*3; } else { s.sp=2.2; }
        
        if(!s.isB) document.getElementById("sc").innerText=Math.floor(s.sc);

        if(dist>5){
            s.a=Math.atan2(dy,dx); s.x+=Math.cos(s.a)*s.sp; s.y+=Math.sin(s.a)*s.sp;
        }
        s.body.unshift({x:s.x, y:s.y});
        if(s.body.length>s.len) s.body.pop();

        // Kiểm tra ăn mồi
        foods.forEach((f,fi)=>{
            if(Math.sqrt((s.x-f.x)**2+(s.y-f.y)**2) < s.r+f.r){
                foods.splice(fi,1); s.sc+=(f.r>4)?2:1; s.len+=(f.r>4)?6:3; fSpawn();
            }
        });

        // Vẽ rắn (Thân, đầu, mắt)
        for(let i=s.body.length-1; i>=0; i-=4){
            ctx.beginPath();ctx.arc(s.body[i].x,s.body[i].y,s.r-2,0,7);ctx.fillStyle=s.c+"b";ctx.fill();
        }
        ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fillStyle=s.c;ctx.fill();
        ctx.fillStyle="#fff";ctx.font="10px Arial";ctx.fillText(s.n,s.x,s.y-s.r-4);
        let lx=s.x+Math.cos(s.a)*5+Math.cos(s.a-1.5)*4, ly=s.y+Math.sin(s.a)*5+Math.sin(s.a-1.5)*4;
        ctx.beginPath();ctx.arc(lx,ly,2,0,7);ctx.fill();
    });

    // Xử lý đâm đầu vào thân nhau -> Chết
    let dead=[];
    snakes.forEach(s1=>{
        snakes.forEach(s2=>{
            if(s1.id===s2.id) return;
            for(let i=12; i<s2.body.length; i+=3){
                if(Math.sqrt((s1.x-s2.body[i].x)**2+(s1.y-s2.body[i].y)**2) < s1.r+s2.r-3){
                    if(!dead.includes(s1)) dead.push(s1);
                }
            }
        });
    });

    dead.forEach(s=>{
        for(let i=0;i<s.body.length;i+=6) fSpawn(s.body[i].x, s.body[i].y, 6, s.c); // Biến thành mồi lớn
        if(s===pSnake){
            active=false; document.getElementById("ui").style.display="none"; document.getElementById("over").style.display="flex";
        } else {
            snakes=snakes.filter(b=>b.id!==s.id); spawn(Math.random()*cv.width, Math.random()*cv.height, colors[Math.floor(Math.random()*5)], "Bot_"+Math.floor(Math.random()*9), true);
        }
    });

    // Bảng xếp hạng
    let lbHTML="", sorted=[...snakes].sort((a,b)=>b.sc-a.sc);
    sorted.slice(0,4).forEach((s,idx)=> lbHTML+=`<div>${idx+1}. ${s.n}: ${Math.floor(s.sc)}</div>`);
    document.getElementById("lb").innerHTML=lbHTML;

    requestAnimationFrame(loop);
}
</script>
</body>
</html>
